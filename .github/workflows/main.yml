name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip
          pip install --user --upgrade Cython==0.29.33 buildozer

      - name: Build with Environment Control
        env:
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_ROOT: ""
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # 통신 단절(Broken pipe) 방지를 위해 --verbose와 비대화형 빌드 수행
          buildozer --verbose android debug || (ls -R .buildozer/android/platform/build-arm64-v8a/ && tail -n 200 .buildozer/android/platform/build-arm64-v8a/build.log && exit 1)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
