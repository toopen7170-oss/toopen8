name: Build Android APK - Final Verified

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 2. 파이썬 환경 및 필수 도구 정밀 설치
        run: |
          sudo apt-get update
          # 빌드에 필요한 시스템 라이브러리 전수 검사 및 설치
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev ffmpeg libssl-dev
          
          # 가상환경 구축으로 시스템 간섭 차단
          python -m venv $HOME/build_env
          source $HOME/build_env/bin/activate
          pip install --upgrade pip
          # [전수검사 수정] Cython 버전을 엔진 최적화 버전인 0.29.33으로 고정
          pip install "sh>=2.0,<3.0" Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: 3. 빌드 환경 기초 공사 (경로 및 라이선스 고착)
        run: |
          # [전수검사 수정] 빌드 경로를 GitHub Workspace 기준으로 통일 (FileNotFoundError 원천 봉쇄)
          SDK_DIR="$GITHUB_WORKSPACE/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/tools/bin"
          mkdir -p "$SDK_DIR/licenses"
          
          # [핵심] 61회의 실패를 끊어낼 최신 SDK 라이선스 해시값 전수 주입
          # API 34 및 최신 빌드 도구에 대응하는 모든 라이선스를 물리적으로 생성합니다.
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c3550b3118b226\n24333f8a71b3d813477583b0b00a6fe40192f722\n84831b9409646a918e30573bab4c9c91346d8abd\n491b01c676f809f471e1944357494a86ca557268\n2f6b0a8809930f78d91c782161b97950c4c478e8" > "$SDK_DIR/licenses/android-sdk-license"
          
          # 시스템 sdkmanager를 Buildozer가 찾는 구형 경로로 강제 연결 (심볼릭 링크)
          SYS_SDK_MGR=$(find /usr/local/lib/android/sdk/cmdline-tools -name sdkmanager | head -n 1)
          if [ -n "$SYS_SDK_MGR" ]; then
            ln -sf "$SYS_SDK_MGR" "$SDK_DIR/tools/bin/sdkmanager"
            chmod +x "$SDK_DIR/tools/bin/sdkmanager"
          fi

      - name: 4. Buildozer 설정 정밀 튜닝 (API 34 고정)
        run: |
          # buildozer.spec 내부의 불확실한 요소들을 명령어로 직접 수정
          if [ -f "buildozer.spec" ]; then
            sed -i 's/^android.api = .*/android.api = 34/' buildozer.spec
            sed -i 's/^#android.build_tools_version = .*/android.build_tools_version = 34.0.0/' buildozer.spec
            sed -i 's/^android.accept_sdk_license = .*/android.accept_sdk_license = 1/' buildozer.spec
            # 아키텍처를 최신 폰에 맞게 arm64-v8a로 명시
            sed -i 's/^android.archs = .*/android.archs = arm64-v8a/' buildozer.spec
          fi

      - name: 5. 정석 빌드 집행 (Error-Free Loop)
        run: |
          source $HOME/build_env/bin/activate
          # 환경 변수 고정으로 엔진 이탈 방지
          export SETUPTOOLS_USE_DISTUTILS=local
          # 빌드 시작
          buildozer -v android debug

      - name: 6. 성공한 APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Final-Verified-Build
          path: bin/*.apk
