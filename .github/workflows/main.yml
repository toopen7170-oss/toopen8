name: Project Master Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev gzip libssl-dev libsqlite3-dev zlib1g-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav libgstreamer-plugins-base1.0-dev
          pip install --user --upgrade Cython==0.29.33 buildozer

      - name: Build with Environment Isolation
        run: |
          # 제3원칙: 환경 절연 설정 (NDK v27 간섭 차단)
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_LATEST_HOME
          export PATH=$PATH:$HOME/.local/bin
          buildozer android debug
        continue-on-error: true

      - name: Upload Build Log on Failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-*/build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProjectMaster-APK
          path: bin/*.apk
