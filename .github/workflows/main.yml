name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config
          pip install --user --upgrade Cython==0.29.33 buildozer

      - name: Build Android APK (Source Cleanup Mode)
        env:
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_ROOT: ""
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # [핵심] 빌드 전 불필요한 iOS/macOS 소스 강제 제거 로직 주입
          # 컴파일러가 엉뚱한 파일을 읽지 못하게 차단합니다.
          buildozer --verbose android debug || ( \
            echo "--- CLEANING CONFLICTING SOURCES ---" && \
            find .buildozer/android/platform/build-arm64-v8a/ -type d -name "Xcode" -exec rm -rf {} + && \
            find .buildozer/android/platform/build-arm64-v8a/ -type d -name "macOS" -exec rm -rf {} + && \
            buildozer --verbose android debug )

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Full Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
