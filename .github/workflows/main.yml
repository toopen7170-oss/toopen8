name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config
          pip install --user --upgrade Cython==0.29.33 buildozer

      - name: Build Android APK (Double Guard Mode)
        run: |
          # 1. 실행 경로 확보
          export PATH=$PATH:$HOME/.local/bin
          
          # 2. [강력 조치] 현재 쉘 세션에서 즉시 좀비 변수 박멸
          export ANDROID_NDK_HOME=""
          export ANDROID_NDK_ROOT=""
          export ANDROID_NDK_LATEST_HOME=""
          export ANDROID_HOME=""
          export ANDROID_SDK_ROOT=""
          
          # 3. Buildozer 실행 시 환경 변수를 직접 초기화하며 명령 전달
          # 변수가 살아날 틈을 주지 않고 명령줄에서 직접 제어합니다.
          ANDROID_NDK_HOME="" ANDROID_NDK_ROOT="" buildozer --verbose android debug || ( \
            echo "--- Resolving SDL2_mixer Source Conflict ---" && \
            find .buildozer/android/platform/build-arm64-v8a/ -type d \( -name "Xcode" -o -name "macOS" -o -name "iOS" \) -exec rm -rf {} + && \
            ANDROID_NDK_HOME="" ANDROID_NDK_ROOT="" buildozer --verbose android debug )

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
