name: Build Android APK - Final Zero-Error 64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 2. [전수검사 수정] 파이썬 3.11 고정 및 필수 도구 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 3.12의 distutils 미지원 문제를 피하기 위해 3.11로 강제 고정

      - name: 3. 시스템 의존성 및 구형 모듈 호환성 확보
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev python3-setuptools libffi-dev build-essential zip libltdl-dev ffmpeg libssl-dev
          
          python -m pip install --upgrade pip
          # [핵심] distutils 오류 방지를 위해 setuptools 버전을 60.0.0 미만으로 조정하거나 
          # 파이썬 3.11 환경에서 가장 안정적인 버전을 설치합니다.
          pip install "setuptools<60.0.0" "sh>=2.0,<3.0" Cython==0.29.33 buildozer kivy kivymd pillow requests

      - name: 4. 빌드 경로 확보 및 라이선스 강제 주입
        run: |
          # 모든 경로를 GitHub Workspace 기준으로 통일
          SDK_DIR="$GITHUB_WORKSPACE/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/tools/bin"
          mkdir -p "$SDK_DIR/licenses"
          
          # 63회까지의 모든 실패를 끝낼 최신 SDK 라이선스 전수 주입 (API 34 대응)
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7437c3550b3118b226\n24333f8a71b3d813477583b0b00a6fe40192f722\n84831b9409646a918e30573bab4c9c91346d8abd\n491b01c676f809f471e1944357494a86ca557268\n2f6b0a8809930f78d91c782161b97950c4c478e8" > "$SDK_DIR/licenses/android-sdk-license"
          
          # 시스템 sdkmanager를 Buildozer 표준 경로로 연결 (권한 충돌 방지 위해 chmod 생략)
          SYS_SDK_MGR=$(find /usr/local/lib/android/sdk/cmdline-tools -name sdkmanager | head -n 1)
          if [ -n "$SYS_SDK_MGR" ]; then
            ln -sf "$SYS_SDK_MGR" "$SDK_DIR/tools/bin/sdkmanager"
          fi

      - name: 5. Buildozer 설정 정밀 튜닝
        run: |
          if [ -f "buildozer.spec" ]; then
            # API 34 및 64비트 아키텍처 강제 고정
            sed -i 's/^android.api = .*/android.api = 34/' buildozer.spec
            sed -i 's/^#android.build_tools_version = .*/android.build_tools_version = 34.0.0/' buildozer.spec
            sed -i 's/^android.accept_sdk_license = .*/android.accept_sdk_license = 1/' buildozer.spec
            sed -i 's/^android.archs = .*/android.archs = arm64-v8a/' buildozer.spec
          fi

      - name: 6. 정석 빌드 실행 (Success Final)
        run: |
          # distutils 호환성을 위한 환경변수 주입
          export SETUPTOOLS_USE_DISTUTILS=stdlib
          buildozer -v android debug

      - name: 7. 최종 APK 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Final-64-Success
          path: bin/*.apk
