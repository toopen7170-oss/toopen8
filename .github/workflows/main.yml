name: Build PristonTale Manager

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # [오류 해결] 파이썬 버전을 3.10으로 고정하고 따옴표를 사용하여 정확히 인식시킵니다.
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev \
            sqlite3 \
            libffi-dev \
            libssl-dev \
            aidane-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            cmake \
            ant \
            openjdk-17-jdk \
            unzip \
            zip

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy

      # [무결성 검사] 빌드 전 환경 점검
      - name: Build with Buildozer
        run: |
          buildozer android debug
        env:
          # 안드로이드 SDK 라이선스 자동 동의
          YES: 1

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: PristonTale-Manager-APK
          path: bin/*.apk
