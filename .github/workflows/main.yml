name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev
          pip install --user --upgrade Cython==0.29.33 buildozer

      - name: Build and Real-time Log
        run: |
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_LATEST_HOME
          export PATH=$PATH:$HOME/.local/bin
          # 빌드 시작 (실패 시 즉시 중단 및 에러 출력)
          yes | buildozer android debug || (tail -n 100 .buildozer/android/platform/build-*/build.log && exit 1)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Full Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-*/build.log
