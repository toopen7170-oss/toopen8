name: Build PristonTale Manager

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 최신 버전 v4 적용

      - name: Set up Python
        uses: actions/setup-python@v5 # 최신 버전 v5 적용
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev \
            sqlite3 \
            libffi-dev \
            libssl-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            cmake \
            ant \
            openjdk-17-jdk \
            unzip \
            zip

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy

      - name: Build with Buildozer
        run: |
          buildozer android debug
        env:
          YES: 1

      # [핵심 수정] v3에서 v4로 업그레이드하여 빌드 실패 해결
      - name: Upload APK
        uses: actions/upload-artifact@v4 
        with:
          name: PristonTale-Manager-APK-${{ github.run_number }}
          path: bin/*.apk
