name: Build Android APK - FINAL REAL FIX

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 코드 다운로드
        uses: actions/checkout@v4

      - name: 2. Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. 시스템 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zip unzip openjdk-17-jdk ffmpeg

      - name: 4. Python 패키지
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<60.0.0"
          pip install cython==0.29.33
          pip install buildozer kivy kivymd pillow requests plyer

      - name: 5. Android SDK 직접 설치
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
          unzip sdk.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest

          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

          yes | sdkmanager --licenses

          sdkmanager "platform-tools"
          sdkmanager "platforms;android-34"
          sdkmanager "build-tools;34.0.0"

      - name: 6. Buildozer SDK 강제 연결
        run: |
          mkdir -p $HOME/.buildozer/android/platform
          rm -rf $HOME/.buildozer/android/platform/android-sdk
          ln -s $HOME/android-sdk $HOME/.buildozer/android/platform/android-sdk

      - name: 7. NDK 초기화
        run: |
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK

      - name: 8. buildozer.spec 수정
        run: |
          sed -i 's/^android.api = .*/android.api = 34/' buildozer.spec
          sed -i 's/^#android.build_tools_version = .*/android.build_tools_version = 34.0.0/' buildozer.spec
          sed -i 's/^#\?android.ndk = .*/android.ndk = 25b/' buildozer.spec

      - name: 9. APK 빌드
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          buildozer -v android debug

      - name: 10. APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: FINAL-APK
          path: bin/*.apk