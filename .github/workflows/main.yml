name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies & Library Fix
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config \
          libncursesw6 libtinfo6 libstdc++6 libtool autoconf autoconf-archive binutils
          
          python -m venv $HOME/build_env
          source $HOME/build_env/bin/activate
          pip install --upgrade pip setuptools wheel
          # 의존성 충돌 방지를 위해 sh 라이브러리 버전을 강제 조정합니다.
          pip install "sh>=2.0,<3.0" Cython==0.29.33 buildozer
          pip install git+https://github.com/kivy/python-for-android.git

      - name: Pre-Configure NDK r26b (Manual Placement)
        run: |
          # Buildozer가 스스로 다운로드하지 못하게 우리가 경로를 선점합니다.
          mkdir -p $HOME/.buildozer/android/platform
          cd $HOME/.buildozer/android/platform
          curl -L https://dl.google.com/android/repository/android-ndk-r26b-linux.zip -o ndk.zip
          unzip -q ndk.zip
          # 빌드 엔진이 내부적으로 찾는 표준 이름으로 폴더명을 고정합니다.
          mv android-ndk-r26b android-ndk-r26b
          rm ndk.zip
          
          # SDK 라이선스 사전 승인
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Execute Buildozer (Offline NDK Mode)
        run: |
          source $HOME/build_env/bin/activate
          
          # [핵심] Buildozer가 NDK를 다시 받지 않고 로컬 경로를 쓰도록 spec 파일을 강제 개조합니다.
          if [ -f buildozer.spec ]; then
            sed -i 's|^#\? \?android.ndk_path =.*|android.ndk_path = /home/runner/.buildozer/android/platform/android-ndk-r26b|' buildozer.spec
            sed -i 's|^#\? \?android.ndk =.*|android.ndk = r26b|' buildozer.spec
            # 자동 다운로드 방지를 위해 NDK 버전을 명시적으로 고정
            sed -i 's|^#\? \?android.ndk_api =.*|android.ndk_api = 21|' buildozer.spec
          fi

          # 환경 변수 5중 잠금 (p4a 및 buildozer 변수 통합)
          export NDK_PATH="/home/runner/.buildozer/android/platform/android-ndk-r26b"
          export ANDROID_NDK=$NDK_PATH
          export ANDROIDNDK=$NDK_PATH
          export ANDROID_NDK_HOME=$NDK_PATH
          export ANDROID_NDK_ROOT=$NDK_PATH
          export P4A_ndk_directory=$NDK_PATH
          
          # 매크로 및 빌드 환경 안정화
          export ACLOCAL_PATH="/usr/share/aclocal"
          export SETUPTOOLS_USE_DISTUTILS=local
          export TERM=dumb
          
          # 잔재 제거 후 빌드 시작
          rm -rf .buildozer/android/platform/build-arm64-v8a
          buildozer --verbose android debug

      - name: Upload Verified APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Manager-Ultimate-Build
          path: bin/*.apk
