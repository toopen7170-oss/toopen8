name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Essentials (Ubuntu 24 Optimized)
        run: |
          sudo apt-get update
          # Ubuntu 24에 맞춰 libncurses6 및 libtinfo6로 업데이트
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config \
          libncurses6 libtinfo6 libncurses-dev libstdc++6
          pip install --user --upgrade Cython==0.29.33 buildozer

      - name: Absolute Deep Clean & Build
        run: |
          export PATH=$PATH:$HOME/.local/bin
          
          # 1. 서버 좀비 변수 완전 봉쇄
          export ANDROID_NDK=""
          export ANDROID_NDK_HOME=""
          export ANDROID_NDK_ROOT=""
          export ANDROID_NDK_LATEST_HOME=""
          export ANDROID_HOME=""
          export ANDROID_SDK_ROOT=""
          
          # 2. 오염된 빌드 캐시 초기화
          rm -rf .buildozer/android/platform/build-arm64-v8a
          
          # 3. 인라인 변수 주입 빌드 및 SDL2 소스 정화 로직
          ANDROID_NDK="" ANDROID_NDK_HOME="" ANDROID_NDK_ROOT="" buildozer --verbose android debug || ( \
            echo "--- Purging Incompatible SDL2 Headers ---" && \
            find .buildozer/android/platform/ -type d \( -name "Xcode" -o -name "macOS" -o -name "iOS" \) -exec rm -rf {} + && \
            ANDROID_NDK="" ANDROID_NDK_HOME="" ANDROID_NDK_ROOT="" buildozer --verbose android debug )

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
