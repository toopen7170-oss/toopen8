name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
          pip install --user --upgrade Cython==0.29.33 buildozer

      - name: Build with Environment Isolation
        run: |
          # NDK v27 간섭 방지
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_LATEST_HOME
          export PATH=$PATH:$HOME/.local/bin
          buildozer android debug
        continue-on-error: true

      - name: Upload Build Log on Failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-*/build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk
