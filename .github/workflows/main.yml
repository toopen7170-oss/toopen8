name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Essentials (Noble Absolute Fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config \
          libncursesw6 libtinfo6 libstdc++6 python3-setuptools python3-pip python3-dev python3-venv
          
          # 시스템 환경과 격리된 빌드 전용 가상환경 생성 및 도구 설치
          python3 -m venv $HOME/build_env
          source $HOME/build_env/bin/activate
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer
          pip install git+https://github.com/kivy/python-for-android.git

      - name: Force NDK Overwrite & Build
        run: |
          # 가상환경 활성화
          source $HOME/build_env/bin/activate
          
          # 1. 하위 호환성 링크 강제 생성
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libncursesw.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
          
          # 2. 오염된 빌드 폴더 제거
          rm -rf .buildozer/android/platform/build-arm64-v8a
          
          # 3. [핵심] 시스템 변수 v27을 명령줄에서 직접 공백으로 덮어쓰기
          # ANDROID_NDK를 ""로 고정하여 서버가 주입한 v27 경로를 무효화합니다.
          ANDROID_NDK="" \
          ANDROID_NDK_HOME="/home/runner/.buildozer/android/platform/android-ndk-r26b" \
          P4A_ndk_directory="/home/runner/.buildozer/android/platform/android-ndk-r26b" \
          buildozer --verbose android debug || ( \
            echo "--- Emergency Reset: Retrying with Clean Headers ---" && \
            find .buildozer/android/platform/ -type d \( -name "Xcode" -o -name "macOS" -o -name "iOS" \) -exec rm -rf {} + && \
            ANDROID_NDK="" \
            ANDROID_NDK_HOME="/home/runner/.buildozer/android/platform/android-ndk-r26b" \
            P4A_ndk_directory="/home/runner/.buildozer/android/platform/android-ndk-r26b" \
            buildozer --verbose android debug )

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
