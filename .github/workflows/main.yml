name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Essentials (Python 3.12 Bridge Fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config \
          libncursesw6 libtinfo6 libstdc++6 python3-setuptools python3-pip python3-dev python3-venv
          
          # 1. 가상환경 완전 초기화
          rm -rf $HOME/build_env
          python3 -m venv $HOME/build_env
          source $HOME/build_env/bin/activate
          
          # 2. Python 3.12 호환성 강제 패치 (구형 distutils 복원)
          python -m pip install --upgrade pip
          pip install "setuptools<60.0.0" "wheel" "Cython<3.0"
          
          # 3. Buildozer 및 p4a 설치
          pip install buildozer
          pip install git+https://github.com/kivy/python-for-android.git

      - name: Hard-Execution & NDK Perms Fix
        run: |
          source $HOME/build_env/bin/activate
          
          # 4. NDK 경로 r26b로 철저 고정 (차단 유지)
          NDK_PATH="/home/runner/.buildozer/android/platform/android-ndk-r26b"
          export ANDROID_NDK=$NDK_PATH
          export ANDROID_NDK_HOME=$NDK_PATH
          export ANDROID_NDK_ROOT=$NDK_PATH
          export ANDROID_NDK_LATEST_HOME=$NDK_PATH
          export P4A_ndk_directory=$NDK_PATH
          
          # 5. [핵심] NDK 실행 권한 강제 부여 (툴체인 생성 오류 방지)
          find $NDK_PATH -type f -name "*" -exec chmod +x {} + || true
          
          # 6. 구형 라이브러리 참조 강제 우회 설정
          export SETUPTOOLS_USE_DISTUTILS=local
          
          # 7. 오염된 빌드 잔재 완전 제거
          rm -rf .buildozer/android/platform/build-arm64-v8a
          
          # 8. 빌드 강제 집행 (가짜 경로 차단 모드)
          buildozer --verbose android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
