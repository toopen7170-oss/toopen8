name: Build Android APK - Stable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 체크아웃
        uses: actions/checkout@v4

      - name: 2. Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. 시스템 패키지 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsqlite3-dev \
            python3-setuptools \
            libffi-dev \
            build-essential \
            zip \
            libltdl-dev \
            ffmpeg \
            libssl-dev

          python -m pip install --upgrade pip

          # 🔥 핵심 (kivy 설치 금지)
          pip install "setuptools<60.0.0" "sh>=2.0,<3.0" Cython==0.29.33 buildozer

      - name: 4. 환경 설정
        run: |
          export SETUPTOOLS_USE_DISTUTILS=stdlib

      - name: 5. 빌드
        run: |
          buildozer android clean
          buildozer -v android debug

      - name: 6. APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: Priston-Tale-APK
          path: bin/*.apk