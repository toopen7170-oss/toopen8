name: PristonTale Android Build (Final Zero-Error)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Hard-Fix Environment (Step 1-59 Total Fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config \
          libncursesw6 libtinfo6 libstdc++6 libtool autoconf autoconf-archive binutils
          
          python -m venv $HOME/build_env
          source $HOME/build_env/bin/activate
          pip install --upgrade pip setuptools wheel
          # [핵심] sh 버전을 강제 고정하여 엔진의 발작을 막습니다.
          pip install --force-reinstall "sh==2.0.6" Cython==0.29.33 buildozer
          pip install git+https://github.com/kivy/python-for-android.git

      - name: NDK Absolute Defense (Typo-Proofing)
        run: |
          sudo mkdir -p /opt/android
          sudo chown $USER:$USER /opt/android
          cd /opt/android
          curl -L https://dl.google.com/android/repository/android-ndk-r26b-linux.zip -o ndk.zip
          unzip -q ndk.zip
          
          # [오류 대처] 엔진이 r26b와 rr26b(오타) 중 무엇을 찾아도 통과하도록 두 가지 이름을 모두 확보합니다.
          mv android-ndk-r26b android-ndk-r26b_actual
          ln -s android-ndk-r26b_actual android-ndk-r26b
          ln -s android-ndk-r26b_actual android-ndk-rr26b
          rm ndk.zip

      - name: Execute Buildozer (Deceive & Build)
        run: |
          source $HOME/build_env/bin/activate
          NDK_PATH="/opt/android/android-ndk-r26b"
          
          # [엔진 속임수] Buildozer가 git clone을 하기 전에 우리가 직접 엔진을 해당 위치에 심어버립니다.
          PLATFORM_DIR="$GITHUB_WORKSPACE/.buildozer/android/platform"
          mkdir -p "$PLATFORM_DIR"
          cp -r $(python -c 'import pythonforandroid; print(pythonforandroid.__path__[0])') "$PLATFORM_DIR/python-for-android"
          
          # buildozer.spec 강제 개조
          if [ -f buildozer.spec ]; then
            sed -i "s|^#\? \?android.ndk_path =.*|android.ndk_path = $NDK_PATH|" buildozer.spec
            sed -i 's|^#\? \?android.ndk =.*|android.ndk = r26b|' buildozer.spec
            sed -i 's|^#\? \?android.ndk_api =.*|android.ndk_api = 21|' buildozer.spec
            sed -i "s|^#\? \?p4a.source_dir =.*|p4a.source_dir = $PLATFORM_DIR/python-for-android|" buildozer.spec
          fi

          # 6중 환경 변수 쇠말뚝
          export ANDROID_NDK=$NDK_PATH
          export ANDROIDNDK=$NDK_PATH
          export ANDROID_NDK_HOME=$NDK_PATH
          export ANDROID_NDK_ROOT=$NDK_PATH
          export P4A_ndk_directory=$NDK_PATH
          export NDK_HOME=$NDK_PATH
          export SETUPTOOLS_USE_DISTUTILS=local
          
          # 클린 빌드 집행
          buildozer --verbose android debug

      - name: Upload PT1-Manager APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Manager-Build-60-Success
          path: bin/*.apk
