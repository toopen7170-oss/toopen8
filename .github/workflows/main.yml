name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies (Full Patch)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config \
          libncursesw6 libtinfo6 libstdc++6 libtool autoconf autoconf-archive binutils
          
          python -m venv $HOME/build_env
          source $HOME/build_env/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33 buildozer
          # 매크로 패치가 포함된 p4a 최신 버전 강제 설치
          pip install git+https://github.com/kivy/python-for-android.git

      - name: Configure Clean NDK r26b
        run: |
          mkdir -p $HOME/.buildozer/android/platform
          cd $HOME/.buildozer/android/platform
          curl -L https://dl.google.com/android/repository/android-ndk-r26b-linux.zip -o ndk.zip
          unzip -q ndk.zip
          mv android-ndk-r26b android-ndk-r26b-fixed
          rm ndk.zip

      - name: Execute Buildozer with Path Isolation
        run: |
          source $HOME/build_env/bin/activate
          
          # [핵심] 시스템 기본 NDK 경로를 무력화하고 우리가 설치한 경로로 통일합니다.
          NDK_PATH="$HOME/.buildozer/android/platform/android-ndk-r26b-fixed"
          
          export ANDROID_NDK=$NDK_PATH
          export ANDROID_NDK_HOME=$NDK_PATH
          export ANDROID_NDK_ROOT=$NDK_PATH
          export P4A_ndk_directory=$NDK_PATH
          
          # [매크로 오류 해결] 시스템 aclocal 경로 지정
          export ACLOCAL_PATH="/usr/share/aclocal"
          export TERM=dumb
          
          # 빌드 전 잔재 소거
          rm -rf .buildozer/android/platform/build-arm64-v8a
          
          # 빌드 실행 (Distutils 호환성 모드 유지)
          SETUPTOOLS_USE_DISTUTILS=local buildozer --verbose android debug

      - name: Upload Verified APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Manager-Final
          path: bin/*.apk
