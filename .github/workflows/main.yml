name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Essentials (Ubuntu 24 Absolute Fix)
        run: |
          sudo apt-get update
          # Ubuntu 24 전용 필수 라이브러리 및 가상환경 도구 설치
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config \
          libncursesw6 libtinfo6 libstdc++6 python3-setuptools python3-pip python3-dev python3-venv
          
          # 시스템 패키지 제한을 우회하여 핵심 도구 강제 설치
          pip install --user --upgrade --break-system-packages Cython==0.29.33 buildozer
          pip install --user --upgrade --break-system-packages git+https://github.com/kivy/python-for-android.git

      - name: Absolute Environment Purge & Build
        run: |
          export PATH=$PATH:$HOME/.local/bin
          
          # 1. 서버가 주입하는 오염된 NDK 변수를 메모리에서 완전히 소거 (Unset)
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_LATEST_HOME
          unset ANDROID_HOME
          unset ANDROID_SDK_ROOT
          
          # 2. 하위 호환성 레이어 물리적 생성
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libncursesw.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
          
          # 3. 빌드 캐시 초기화
          rm -rf .buildozer/android/platform/build-arm64-v8a
          
          # 4. 독점 경로(r26b) 주입 빌드 실행
          # 서버 변수가 다시 살아나지 못하도록 빌드 명령줄에 직접 변수를 매핑합니다.
          P4A_ndk_directory="/home/runner/.buildozer/android/platform/android-ndk-r26b" \
          ANDROID_NDK_HOME="/home/runner/.buildozer/android/platform/android-ndk-r26b" \
          buildozer --verbose android debug || ( \
            echo "--- Critical Purge: Retrying with Full Reset ---" && \
            find .buildozer/android/platform/ -type d \( -name "Xcode" -o -name "macOS" -o -name "iOS" \) -exec rm -rf {} + && \
            P4A_ndk_directory="/home/runner/.buildozer/android/platform/android-ndk-r26b" \
            ANDROID_NDK_HOME="/home/runner/.buildozer/android/platform/android-ndk-r26b" \
            buildozer --verbose android debug )

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
