name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Essentials (Hard-Block Fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config \
          libncursesw6 libtinfo6 libstdc++6 python3-setuptools python3-pip python3-dev python3-venv
          
          python3 -m venv $HOME/build_env
          source $HOME/build_env/bin/activate
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer
          pip install git+https://github.com/kivy/python-for-android.git

      - name: Hard-Block Server Paths & Build
        run: |
          source $HOME/build_env/bin/activate
          
          # 1. 서버 NDK 변수 사살 및 권한 해제
          sudo chmod -R 777 /home/runner/.buildozer/android/platform/android-ndk-r26b || true
          
          # 2. [핵심] p4a 설정 파일을 수동으로 생성하여 서버 경로 차단
          # 이 파일이 있으면 p4a는 시스템 환경변수를 무시하고 이 설정만 따릅니다.
          mkdir -p $HOME/.local/share/python-for-android/
          echo "--ndk-dir=/home/runner/.buildozer/android/platform/android-ndk-r26b" > $HOME/.p4a
          echo "--dist_name=pristontale" >> $HOME/.p4a
          
          # 3. 유령 변수 완전 소거 (세션 레벨)
          export ANDROID_NDK=""
          export ANDROID_NDK_ROOT=""
          export ANDROID_HOME=""
          export ANDROID_SDK_ROOT=""
          export ANDROID_NDK_LATEST_HOME=""
          
          # 4. 하위 호환성 링크
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libncursesw.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
          
          # 5. 오염된 빌드 폴더 완전 삭제
          rm -rf .buildozer/android/platform/build-arm64-v8a
          
          # 6. 빌드 강제 집행 (명령줄에서 서버 변수 재압살)
          ANDROID_NDK="" ANDROID_NDK_ROOT="" ANDROID_HOME="" \
          P4A_ndk_directory="/home/runner/.buildozer/android/platform/android-ndk-r26b" \
          buildozer --verbose android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
