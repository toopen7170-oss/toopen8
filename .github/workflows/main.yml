name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Essentials (Noble Final Fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config \
          libncursesw6 libtinfo6 libstdc++6 python3-setuptools python3-pip python3-dev python3-venv
          
          # 가상환경 구축으로 시스템 Python 간섭 차단
          python3 -m venv $HOME/build_env
          source $HOME/build_env/bin/activate
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer
          pip install git+https://github.com/kivy/python-for-android.git

      - name: Absolute Environment Purge & Build
        run: |
          source $HOME/build_env/bin/activate
          
          # 1. 시스템 라이브러리 강제 매핑 (NDK 속이기)
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libncursesw.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
          
          # 2. 서버가 주입하는 모든 변수를 독점적으로 덮어쓰기 (export 방식)
          export ANDROID_NDK=""
          export ANDROID_NDK_HOME="/home/runner/.buildozer/android/platform/android-ndk-r26b"
          export ANDROID_NDK_ROOT=""
          export ANDROID_HOME=""
          export ANDROID_SDK_ROOT=""
          export P4A_ndk_directory="/home/runner/.buildozer/android/platform/android-ndk-r26b"
          
          # 3. 정밀 정화 (오염된 플랫폼 데이터 삭제)
          rm -rf .buildozer/android/platform/build-arm64-v8a
          rm -rf .buildozer/android/platform/python-for-android
          
          # 4. 빌드 실행 (환경변수 완전 격리 상태)
          buildozer --verbose android debug || ( \
            echo "--- Critical Reset: Forcing Pure Build ---" && \
            find .buildozer/android/platform/ -type d \( -name "Xcode" -o -name "macOS" -o -name "iOS" \) -exec rm -rf {} + && \
            buildozer --verbose android debug )

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
