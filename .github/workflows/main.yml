name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          # Ubuntu 24.04 대응 필수 패키지 강제 주입
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld
          pip install --user --upgrade Cython==0.29.33 buildozer

      - name: Build Android APK
        env:
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_ROOT: ""
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # 비대화형 자동 빌드 및 실시간 로그 출력 강화
          buildozer --verbose android debug || (grep -r "error:" .buildozer/android/platform/build-arm64-v8a/ && exit 1)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
