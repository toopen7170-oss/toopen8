name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config
          pip install --user --upgrade Cython==0.29.33 buildozer

      - name: Build Android APK (Absolute Zero Isolation)
        run: |
          export PATH=$PATH:$HOME/.local/bin
          
          # [전수 검사 수정 사항 1] 마지막 남은 좀비 변수 'ANDROID_NDK'까지 물리적 말소
          export ANDROID_NDK=""
          export ANDROID_NDK_HOME=""
          export ANDROID_NDK_ROOT=""
          export ANDROID_NDK_LATEST_HOME=""
          export ANDROID_HOME=""
          export ANDROID_SDK_ROOT=""
          
          # [전수 검사 수정 사항 2] 빌드 명령 시점에 인라인(Inline) 변수 주입으로 서버 간섭 100% 차단
          # 실패 시 Xcode/macOS 관련 불필요한 헤더를 자동 삭제 후 재빌드 시도
          ANDROID_NDK="" ANDROID_NDK_HOME="" ANDROID_NDK_ROOT="" buildozer --verbose android debug || ( \
            echo "--- Critical: Cleaning SDL2 Conflict Sources ---" && \
            find .buildozer/android/platform/build-arm64-v8a/ -type d \( -name "Xcode" -o -name "macOS" -o -name "iOS" \) -exec rm -rf {} + && \
            ANDROID_NDK="" ANDROID_NDK_HOME="" ANDROID_NDK_ROOT="" buildozer --verbose android debug )

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
