name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Essentials (Ultimate Fix for Ubuntu 24)
        run: |
          sudo apt-get update
          # Ubuntu 24 환경 최적화 패키지 및 Python 핵심 의존성 설치
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config \
          libncurses6 libtinfo6 libstdc++6 python3-setuptools python3-pip python3-dev
          
          # Cython 버전을 안정화된 0.29.33으로 고정하여 컴파일 오류 차단
          pip install --user --upgrade Cython==0.29.33 buildozer virtualenv

      - name: Absolute Deep Clean & Build
        run: |
          export PATH=$PATH:$HOME/.local/bin
          
          # 1. 서버 간섭 변수 완전 봉쇄 (진공 상태 유지)
          export ANDROID_NDK=""
          export ANDROID_NDK_HOME=""
          export ANDROID_NDK_ROOT=""
          export ANDROID_NDK_LATEST_HOME=""
          export ANDROID_HOME=""
          export ANDROID_SDK_ROOT=""
          
          # 2. 오염된 빌드 캐시 물리적 초기화
          rm -rf .buildozer/android/platform/build-arm64-v8a
          
          # 3. 인라인 변수 주입 빌드 및 SDL2 소스 정화 로직 실행
          ANDROID_NDK="" ANDROID_NDK_HOME="" ANDROID_NDK_ROOT="" buildozer --verbose android debug || ( \
            echo "--- Purging Incompatible Fragments ---" && \
            find .buildozer/android/platform/ -type d \( -name "Xcode" -o -name "macOS" -o -name "iOS" \) -exec rm -rf {} + && \
            ANDROID_NDK="" ANDROID_NDK_HOME="" ANDROID_NDK_ROOT="" buildozer --verbose android debug )

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
