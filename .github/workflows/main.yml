name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config
          pip install --user --upgrade Cython==0.29.33 buildozer

      - name: Build Android APK (Absolute Isolation)
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # 서버에 숨겨진 모든 안드로이드 관련 변수를 강제로 삭제하여 간섭 차단
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK_LATEST_HOME
          unset ANDROID_SDK_ROOT
          unset ANDROID_HOME
          
          # [핵심] 빌드 시작 전 Xcode/macOS 관련 파일이 잔존할 경우 컴파일 충돌 방지
          buildozer --verbose android debug || ( \
            echo "--- Resolving SDL2_mixer Conflict ---" && \
            find .buildozer/android/platform/build-arm64-v8a/ -type d \( -name "Xcode" -o -name "macOS" -o -name "iOS" \) -exec rm -rf {} + && \
            buildozer --verbose android debug )

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
