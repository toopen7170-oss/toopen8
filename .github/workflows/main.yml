name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config \
          libncursesw6 libtinfo6 libstdc++6 libtool autoconf autoconf-archive binutils
          
          python -m venv $HOME/build_env
          source $HOME/build_env/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33 buildozer
          pip install git+https://github.com/kivy/python-for-android.git

      - name: Configure Clean NDK r26b
        run: |
          mkdir -p $HOME/.buildozer/android/platform
          cd $HOME/.buildozer/android/platform
          curl -L https://dl.google.com/android/repository/android-ndk-r26b-linux.zip -o ndk.zip
          unzip -q ndk.zip
          # 경로를 빌드 엔진이 예상하는 기본 이름으로 맞추어 혼선을 방지합니다.
          mv android-ndk-r26b android-ndk-r26b-fixed
          rm ndk.zip
          
          # SDK 라이선스 강제 동의
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Hard-Fix buildozer.spec & Execute
        run: |
          source $HOME/build_env/bin/activate
          
          # [핵심 수정] spec 파일 내의 NDK 경로 설정을 강제로 우리 경로로 바꿉니다.
          # 빌드 엔진이 내부적으로 변수를 덮어쓰는 것을 원천 봉쇄합니다.
          if [ -f buildozer.spec ]; then
            sed -i 's|^#\? \?android.ndk_path =.*|android.ndk_path = /home/runner/.buildozer/android/platform/android-ndk-r26b-fixed|' buildozer.spec
            sed -i 's|^#\? \?android.ndk =.*|android.ndk = r26b|' buildozer.spec
          fi

          # 환경 변수 4중 방어막
          export NDK_PATH="/home/runner/.buildozer/android/platform/android-ndk-r26b-fixed"
          export ANDROID_NDK=$NDK_PATH
          export ANDROIDNDK=$NDK_PATH
          export ANDROID_NDK_HOME=$NDK_PATH
          export ANDROID_NDK_ROOT=$NDK_PATH
          export P4A_ndk_directory=$NDK_PATH
          
          # 매크로 및 호환성 설정
          export ACLOCAL_PATH="/usr/share/aclocal"
          export SETUPTOOLS_USE_DISTUTILS=local
          export TERM=dumb
          
          # 클린 빌드 집행
          rm -rf .buildozer/android/platform/build-arm64-v8a
          buildozer --verbose android debug

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: PT1-Manager-Perfect-Build
          path: bin/*.apk
