name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev
          pip install --user --upgrade Cython==0.29.33 buildozer

      - name: Build with Total Isolation
        env:
          # 서버 기본 NDK 강제 무력화
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_LATEST_HOME: ""
          ANDROID_NDK_ROOT: ""
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # 빌드 에러 시 유령 성공 방지 및 실제 에러 즉시 노출
          yes | buildozer android debug || (cat .buildozer/android/platform/build-arm64-v8a/dists/pristontale/build.log || tail -n 100 .buildozer/android/platform/build-arm64-v8a/build.log && exit 1)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Full Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
