name: Build APK (STABLE 100%)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 체크아웃
        uses: actions/checkout@v4

      - name: 2. Python 3.10 (안정 버전)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 시스템 패키지 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zip unzip openjdk-17-jdk \
            libffi-dev libssl-dev build-essential \
            libsqlite3-dev zlib1g-dev

      - name: 4. Python 라이브러리
        run: |
          python -m pip install --upgrade pip
          pip install cython==0.29.33 buildozer

      - name: 5. Android SDK 설치 (완전 안정)
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip tools.zip
          mv cmdline-tools latest

          # 🔥 sdkmanager 인식 문제 해결
          mkdir -p $HOME/android-sdk/tools/bin
          ln -s $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager $HOME/android-sdk/tools/bin/sdkmanager

          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

          yes | sdkmanager --licenses

          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      - name: 6. NDK 충돌 제거 + 빌드
        run: |
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          unset ANDROID_NDK

          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

          buildozer -v android debug

      - name: 7. APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk