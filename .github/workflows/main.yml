name: PristonTale Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Essentials (Ultimate Isolation)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev unzip zip cmake lld pkg-config \
          libncursesw6 libtinfo6 libstdc++6 python3-setuptools python3-pip python3-dev python3-venv
          
          # 격리된 가상환경 생성
          python3 -m venv $HOME/build_env
          source $HOME/build_env/bin/activate
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer
          pip install git+https://github.com/kivy/python-for-android.git

      - name: Physical Path Block & Build
        run: |
          source $HOME/build_env/bin/activate
          
          # 1. [강력 차단] 서버가 주입하는 NDK 경로를 물리적으로 무력화
          # 서버의 NDK 폴더가 존재한다면 우리 NDK(r26b)로 강제 연결하여 서버 변수를 속입니다.
          NDK_VERSION_V27="/usr/local/lib/android/sdk/ndk/27.3.13750724"
          NDK_TARGET="/home/runner/.buildozer/android/platform/android-ndk-r26b"
          sudo rm -rf $NDK_VERSION_V27 || true
          sudo mkdir -p $(dirname $NDK_VERSION_V27)
          sudo ln -sf $NDK_TARGET $NDK_VERSION_V27
          
          # 2. 모든 NDK 관련 변수를 우리 경로로 고정
          export ANDROID_NDK=$NDK_TARGET
          export ANDROID_NDK_HOME=$NDK_TARGET
          export ANDROID_NDK_ROOT=$NDK_TARGET
          export P4A_ndk_directory=$NDK_TARGET
          
          # 3. 시스템 라이브러리 링크 (Ubuntu 24 대응)
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libncursesw.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
          
          # 4. 권한 완전 개방 (차단 방지)
          sudo chmod -R 777 $NDK_TARGET || true
          rm -rf .buildozer/android/platform/build-arm64-v8a
          
          # 5. 빌드 실행 (서버 변수 개입 원천 차단)
          buildozer --verbose android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PristonTale-APK
          path: bin/*.apk

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: .buildozer/android/platform/build-arm64-v8a/build.log
